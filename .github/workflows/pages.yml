name: pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install documentation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang doxygen graphviz liberfa-dev wcslib-dev
      - name: Build Doxygen
        run: bash tools/check_docs.sh build-doc
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-doc/docs/doxygen/html/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
