name: quality

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install formatting tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check formatting
        run: bash tools/check_format.sh

  build-lint-test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag version match
        if: startsWith(github.ref, 'refs/tags/')
        run: bash tools/check_release_tag.sh "${GITHUB_REF_NAME}"
      - name: Install build and analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang-tidy gcovr python3-yaml
      - name: Phase 0 manifest and oracle determinism checks
        run: bash tools/check_phase0.sh build
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCASACORE_MINI_WARNINGS_AS_ERRORS=ON \
            -DCASACORE_MINI_ENABLE_CLANG_TIDY=ON \
            -DCASACORE_MINI_ENABLE_COVERAGE=ON \
            -DCASACORE_MINI_ENABLE_DOXYGEN=OFF
      - name: Build
        run: cmake --build build
      - name: Phase 1 schema hook check
        run: bash tools/check_phase1.sh build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Coverage gate
        run: GCOV_EXECUTABLE=gcov bash tools/check_coverage.sh build 70
