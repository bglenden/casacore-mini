name: quality

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install formatting tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check formatting
        run: bash tools/check_format.sh

  build-lint-test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag version match
        if: startsWith(github.ref, 'refs/tags/')
        run: bash tools/check_release_tag.sh "${GITHUB_REF_NAME}"
      - name: Install build and analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-tidy gcovr
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCASACORE_MINI_WARNINGS_AS_ERRORS=ON \
            -DCASACORE_MINI_ENABLE_CLANG_TIDY=ON \
            -DCASACORE_MINI_ENABLE_COVERAGE=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Coverage gate
        run: bash tools/check_coverage.sh build 70
