name: quality

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install formatting tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check formatting
        run: bash tools/check_format.sh

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build and test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang python3-yaml liberfa-dev wcslib-dev
      - name: Fast build/test quality checks
        run: bash tools/check_ci_fast_build_test.sh build
